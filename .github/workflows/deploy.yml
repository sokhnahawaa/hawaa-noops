name: NoOpsSaaS CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          no-cache: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/hawaa:${{ github.run_number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/hawaa:latest

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: "NoOpsSaaS - hawaa - ${{ job.status }}"
          to: ${{ secrets.USER_EMAIL }}
          from: NoOpsSaaS Platform
          body: |
            Deploiement : ${{ job.status }}
            Projet    : hawaa
            Image     : ${{ secrets.DOCKERHUB_USERNAME }}/hawaa:${{ github.run_number }}
            Repo      : https://github.com/${{ github.repository }}
            Pipeline  : https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            DockerHub : https://hub.docker.com/r/${{ secrets.DOCKERHUB_USERNAME }}/hawaa
