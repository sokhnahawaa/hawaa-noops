apiVersion: apps/v1
kind: Deployment
metadata:
  name: hawaa
  labels:
    app: hawaa
    tech: html
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hawaa
  template:
    metadata:
      labels:
        app: hawaa
    spec:
      containers:
      - name: hawaa
        image: DOCKERHUB_USERNAME/hawaa:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
